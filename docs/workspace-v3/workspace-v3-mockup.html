<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zarewa Workspace V3 — Mockup</title>
  <style>
    :root { --teal: #134e4a; --mint: #2ECC71; --slate: #64748b; --bg: #f8fafc; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Plus Jakarta Sans", system-ui, sans-serif; background: var(--bg); color: #0f172a; }
    .shell { display: flex; flex-direction: column; height: 100vh; }
    .cmd { background: #fff; border-bottom: 1px solid #e2e8f0; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .cmd h1 { margin: 0; font-size: 1.15rem; }
    .cmd .eyebrow { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--slate); }
    .btn { background: var(--teal); color: #fff; border: 0; border-radius: 8px; padding: 8px 14px; font-weight: 600; cursor: pointer; }
    .body { display: flex; flex: 1; min-height: 0; }
    .rail { width: 72px; background: #fff; border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 4px; padding: 8px; }
    .rail button { border: 0; background: transparent; border-radius: 8px; padding: 10px 4px; font-size: 0.65rem; font-weight: 600; color: #475569; cursor: pointer; }
    .rail button.active { background: #f0fdfa; color: var(--teal); }
    .main { flex: 1; padding: 16px; overflow: auto; }
    .ctx { width: 280px; background: #fff; border-left: 1px solid #e2e8f0; padding: 12px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; margin-bottom: 8px; }
    .split { display: flex; gap: 12px; height: 100%; }
    .list { width: 40%; }
    .detail { flex: 1; border: 1px dashed #cbd5e1; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--slate); }
    .pill { display: inline-block; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; background: #fef3c7; color: #92400e; }
    .banner { background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="cmd">
      <div>
        <div class="eyebrow">Zarewa Online Office</div>
        <h1>Branch Workspace</h1>
      </div>
      <button class="btn">+ Create</button>
    </div>
    <div class="body">
      <nav class="rail">
        <button class="active">Activity</button>
        <button>Rooms</button>
        <button>Action</button>
        <button>Records</button>
        <button>Apps</button>
      </nav>
      <main class="main">
        <div class="banner"><strong>Priority</strong> — Expense ZR/KAD/FIN/2026/0042 due in 4h</div>
        <div class="card"><strong>@You</strong> BM endorsed leave request <span class="pill">2m</span></div>
        <div class="card"><strong>#store</strong> Coil short-receipt reported <span class="pill">1h</span></div>
        <div class="split" style="display:none">
          <div class="list"><div class="card">Needs action item…</div></div>
          <div class="detail">Select an item</div>
        </div>
      </main>
      <aside class="ctx">
        <div class="eyebrow">Context</div>
        <p style="font-size:0.85rem;color:#64748b">Select a work item or room for people, SLA, and linked ERP.</p>
      </aside>
    </div>
  </div>
</body>
</html>
